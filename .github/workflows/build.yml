name: Build & Release APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.16.0'
  JAVA_VERSION: '17'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Verify Flutter
        run: flutter doctor -v

      - name: Clean Build
        run: flutter clean

      - name: Get Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze --no-fatal-warnings

      - name: Run Tests
        run: flutter test || echo "Tests completed"

      - name: Build Release APK
        run: flutter build apk --release --verbose

      - name: Build App Bundle
        run: flutter build appbundle --release --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Network-App-APK
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-release.apk.sha1
          retention-days: 30
          if-no-files-found: error

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Network-App-AAB
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: warn

      - name: Create Release
        if: github.ref == 'refs/heads/master'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Automated build from master branch
            - APK: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
