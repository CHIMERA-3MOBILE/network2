name: network_app
description: A disguised P2P mesh communication utility application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  nearby_connections: ^3.0.2
  flutter_background_service: ^5.0.1
  permission_handler: ^11.0.1
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  animations: ^2.0.7
  lottie: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
