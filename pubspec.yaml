name: network_app
description: A disguised P2P mesh communication utility application with production-grade quality.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  nearby_connections: ^3.0.2
  flutter_background_service: ^5.0.1
  permission_handler: ^11.0.1
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  animations: ^2.0.7
  lottie: ^2.7.0
  crypto: ^3.0.3
  http: ^1.1.0
  connectivity_plus: ^5.0.2
  device_info_plus: ^9.1.1
  package_info_plus: ^4.2.0
  flutter_secure_storage: ^8.0.0
  local_auth: ^2.1.6
  biometric_storage: ^1.0.2
  flutter_svg: ^2.0.7
  cached_network_image: ^3.2.3
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  flutter_spinkit: ^5.2.0
  google_fonts: ^6.1.0
  flex_color_scheme: ^7.1.2
  dynamic_color: ^1.6.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.2
  build_runner: ^2.4.7
  integration_test:
    sdk: flutter
  test: ^1.24.3
  golden_toolkit: ^0.15.0
  flutter_driver:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
